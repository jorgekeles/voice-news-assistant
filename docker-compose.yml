version: '3.8'

services:
  voice-news-assistant:
    build: .
    container_name: voice-news-assistant
    ports:
      - "8501:8501"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LANGUAGE=${LANGUAGE:-es}
      - TTS_PROVIDER=${TTS_PROVIDER:-edge-tts}
      - VOICE=${VOICE:-es-ES-AlvaroNeural}
    volumes:
      - .:/app
      - /app/.streamlit
    restart: unless-stopped
    stdin_open: true
    tty: true
    # For audio support (macOS/Linux with Docker Desktop)
    # devices:
    #   - /dev/snd:/dev/snd
